{% extends 'home/base.html' %}

{% block heading %}Register Patient{% endblock %}

{% block content %}
<div class="container" style="margin-top: 30px;">
    <div class="row">
        <form class="col s12 m8 offset-m2" method="POST">
            {% csrf_token %}
            <div class="card">
                <div class="card-content">
                    <span class="card-title">New Patient Registration</span>
                    <div class="row">
                        <div class="input-field col s12 m6">
                            <input id="patient_id" name="patient_id" type="text" required>
                            <label for="patient_id">Patient ID</label>
                        </div>
                        <div class="input-field col s12 m6">
                            <input id="phone" name="phone" type="text" required>
                            <label for="phone">Phone Number</label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="input-field col s6">
                            <input id="first_name" name="first_name" type="text" required>
                            <label for="first_name">First Name</label>
                        </div>
                        <div class="input-field col s6">
                            <input id="last_name" name="last_name" type="text" required>
                            <label for="last_name">Last Name</label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="input-field col s12">
                            <input id="dob" name="dob" type="date" required>
                            <label for="dob">Date of Birth</label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="input-field col s12">
                            <textarea id="address" name="address" class="materialize-textarea" required></textarea>
                            <label for="address">Address</label>
                        </div>
                    </div>
                </div>
                <div class="card-action right-align">
                    <a href="{% url 'patient_list' %}" class="btn-flat">Cancel</a>
                    <button type="submit" class="btn blue-grey darken-3">Register</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
