{% extends 'home/base.html' %}

{% block heading %}Edit Staff Member{% endblock %}

{% block content %}
<div class="container" style="margin-top: 30px;">
    <div class="row">
        <form class="col s12 m8 offset-m2" method="POST">
            {% csrf_token %}
            <div class="card">
                <div class="card-content">
                    <span class="card-title">Edit Staff: {{ staff_profile.user.username }}</span>
                    
                    <div class="row">
                        <div class="input-field col s12 m6">
                            <input id="first_name" name="first_name" type="text" value="{{ staff_profile.user.first_name }}" required>
                            <label for="first_name" class="active">First Name</label>
                        </div>
                        <div class="input-field col s12 m6">
                            <input id="last_name" name="last_name" type="text" value="{{ staff_profile.user.last_name }}" required>
                            <label for="last_name" class="active">Last Name</label>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="input-field col s12 m6">
                            <input id="email" name="email" type="email" value="{{ staff_profile.user.email }}">
                            <label for="email" class="active">Email</label>
                        </div>
                        <div class="input-field col s12 m6">
                            <input id="phone" name="phone" type="text" value="{{ staff_profile.phone }}">
                            <label for="phone" class="active">Phone</label>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col s12 m6" style="margin-top: 15px;">
                            <label>System Role</label>
                            <select name="role" required class="browser-default">
                                <option value="PROPRIETOR" {% if staff_profile.role == 'PROPRIETOR' %}selected{% endif %}>Proprietor / Admin</option>
                                <option value="DOCTOR" {% if staff_profile.role == 'DOCTOR' %}selected{% endif %}>Doctor</option>
                                <option value="ATTENDANT" {% if staff_profile.role == 'ATTENDANT' %}selected{% endif %}>Reception / Lab Attendant</option>
                            </select>
                        </div>
                        <div class="input-field col s12 m6">
                            <input id="basic_salary" name="basic_salary" type="number" step="0.01" min="0" value="{{ staff_profile.basic_salary }}" required>
                            <label for="basic_salary" class="active">Basic Salary (Ksh)</label>
                        </div>
                    </div>
                </div>
                <div class="card-action right-align">
                    <a href="{% url 'staff_list' %}" class="btn-flat">Cancel</a>
                    <button type="submit" class="btn blue-grey darken-3">Update Staff</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
