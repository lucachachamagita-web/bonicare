{% extends 'home/base.html' %}

{% block heading %}Register Staff{% endblock %}

{% block content %}
<div class="container" style="margin-top: 30px;">
    <div class="row">
        <form class="col s12 m8 offset-m2" method="POST">
            {% csrf_token %}
            <div class="card">
                <div class="card-content">
                    <span class="card-title">Register New Staff Member</span>
                    
                    <div class="row">
                        <div class="input-field col s12 m6">
                            <input id="first_name" name="first_name" type="text" required>
                            <label for="first_name">First Name</label>
                        </div>
                        <div class="input-field col s12 m6">
                            <input id="last_name" name="last_name" type="text" required>
                            <label for="last_name">Last Name</label>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="input-field col s12 m6">
                            <input id="username" name="username" type="text" required>
                            <label for="username">System Username</label>
                        </div>
                        <div class="input-field col s12 m6">
                            <input id="password" name="password" type="password" required>
                            <label for="password">Initial Password</label>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="input-field col s12 m6">
                            <input id="email" name="email" type="email">
                            <label for="email">Email</label>
                        </div>
                        <div class="input-field col s12 m6">
                            <input id="phone" name="phone" type="text">
                            <label for="phone">Phone</label>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col s12 m6" style="margin-top: 15px;">
                            <label>System Role</label>
                            <select name="role" required class="browser-default">
                                <option value="" disabled selected>Select System Role</option>
                                <option value="PROPRIETOR">Proprietor / Admin</option>
                                <option value="DOCTOR">Doctor</option>
                                <option value="ATTENDANT">Reception / Lab Attendant</option>
                            </select>
                        </div>
                        <div class="input-field col s12 m6">
                            <input id="basic_salary" name="basic_salary" type="number" step="0.01" min="0" required>
                            <label for="basic_salary">Basic Salary (Ksh)</label>
                        </div>
                    </div>
                </div>
                <div class="card-action right-align">
                    <a href="{% url 'staff_list' %}" class="btn-flat">Cancel</a>
                    <button type="submit" class="btn blue-grey darken-3">Create Staff</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
