{% extends 'home/base.html' %}

{% block heading %}Edit Salary Record{% endblock %}

{% block content %}
<div class="container" style="margin-top: 30px;">
    <div class="row">
        <form class="col s12 m8 offset-m2" method="POST">
            {% csrf_token %}
            <div class="card">
                <div class="card-content">
                    <span class="card-title">Edit Salary: {{ salary.employee.first_name }} {{ salary.employee.last_name }}</span>
                    <p>Month: {{ salary.month|date:"F Y" }}</p>
                    
                    <div class="row" style="margin-top: 20px;">
                        <div class="input-field col s12 m6">
                            <input id="base_salary" name="base_salary" type="number" step="0.01" min="0" value="{{ salary.base_salary }}" required>
                            <label for="base_salary" class="active">Base Salary (Ksh)</label>
                        </div>
                        <div class="input-field col s12 m6">
                            <input id="bonus" name="bonus" type="number" step="0.01" min="0" value="{{ salary.bonus }}">
                            <label for="bonus" class="active">Bonus (Ksh)</label>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="input-field col s12">
                            <label>
                                <input type="checkbox" name="is_paid" {% if salary.is_paid %}checked{% endif %} />
                                <span>Mark as Paid</span>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="card-action right-align" style="margin-top: 20px;">
                    <a href="{% url 'salary_list' %}" class="btn-flat">Cancel</a>
                    <button type="submit" class="btn blue-grey darken-3">Update Record</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
