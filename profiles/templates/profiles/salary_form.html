{% extends 'home/base.html' %}

{% block heading %}Log Salary{% endblock %}

{% block content %}
<div class="container" style="margin-top: 30px;">
    <div class="row">
        <form class="col s12 m8 offset-m2" method="POST">
            {% csrf_token %}
            <div class="card">
                <div class="card-content">
                    <span class="card-title">Log Staff Salary</span>
                    
                    <div class="row">
                        <div class="col s12 m6" style="margin-top: 15px;">
                            <label>Employee</label>
                            <select name="employee_id" required class="browser-default">
                                <option value="" disabled selected>Select Employee</option>
                                {% for p in staff %}
                                <option value="{{ p.user.id }}">{{ p.user.first_name }} {{ p.user.last_name }} ({{ p.role }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="input-field col s12 m6">
                            <input id="month" name="month" type="month" required>
                            <label for="month" class="active">Salary Month</label>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="input-field col s12 m6">
                            <input id="base_salary" name="base_salary" type="number" step="0.01" min="0" required>
                            <label for="base_salary">Base Salary (Ksh)</label>
                        </div>
                        <div class="input-field col s12 m6">
                            <input id="bonus" name="bonus" type="number" step="0.01" min="0" value="0.00">
                            <label for="bonus">Bonus (Ksh)</label>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="input-field col s12">
                            <label>
                                <input type="checkbox" name="is_paid" />
                                <span>Mark as Paid</span>
                            </label>
                        </div>
                    </div>
                </div>
                <div class="card-action right-align" style="margin-top: 20px;">
                    <a href="{% url 'salary_list' %}" class="btn-flat">Cancel</a>
                    <button type="submit" class="btn blue-grey darken-3">Save Record</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
