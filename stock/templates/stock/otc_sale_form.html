{% extends 'home/base.html' %}

{% block heading %}Direct OTC Sale{% endblock %}

{% block content %}
<div class="container" style="margin-top: 30px;">
    {% if error %}
    <div class="card-panel red lighten-2 white-text">
        <strong>Error:</strong> {{ error }}
    </div>
    {% endif %}

    <div class="row">
        <form class="col s12 m8 offset-m2" method="POST">
            {% csrf_token %}
            <div class="card">
                <div class="card-content">
                    <span class="card-title">Sell Over-The-Counter</span>
                    
                    <div class="row">
                        <div class="col s12 m8" style="margin-top: 15px;">
                            <label>Item</label>
                            <select name="item_id" required class="browser-default">
                                <option value="" disabled selected>Select Item</option>
                                {% for item in items %}
                                <option value="{{ item.id }}">{{ item.name }} ({{ item.current_quantity }} in stock) - {{ item.unit_price }} KES</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="input-field col s12 m4">
                            <input id="quantity" name="quantity" type="number" min="1" value="1" required>
                            <label for="quantity" class="active">Quantity</label>
                        </div>
                    </div>
                </div>
                <div class="card-action right-align">
                    <a href="{% url 'stock_list' %}" class="btn-flat">Cancel</a>
                    <button type="submit" class="btn green darken-1">Complete Sale</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
