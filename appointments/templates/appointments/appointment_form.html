{% extends 'home/base.html' %}

{% block heading %}Schedule Appointment{% endblock %}

{% block content %}
<div class="container" style="margin-top: 30px;">
    {% if error %}
    <div class="card-panel red lighten-2 white-text">
        <strong>Error:</strong> {{ error }}
    </div>
    {% endif %}
    
    <div class="row">
        <form class="col s12 m8 offset-m2" method="POST">
            {% csrf_token %}
            <div class="card">
                <div class="card-content">
                    <span class="card-title">Schedule New Appointment</span>
                    <div class="row">
                        <div class="col s12 m6" style="margin-top: 15px;">
                            <label>Patient</label>
                            <select name="patient_id" required class="browser-default">
                                <option value="" disabled selected>Select Patient</option>
                                {% for patient in patients %}
                                <option value="{{ patient.id }}">{{ patient.first_name }} {{ patient.last_name }} ({{ patient.patient_id }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col s12 m6" style="margin-top: 15px;">
                            <label>Doctor</label>
                            <select name="doctor_id" required class="browser-default">
                                <option value="" disabled selected>Select Doctor</option>
                                {% for doc in doctors %}
                                <option value="{{ doc.id }}">Dr. {{ doc.last_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="row">
                        <div class="input-field col s12">
                            <input id="date_time" name="date_time" type="datetime-local" required>
                            <label for="date_time" class="active">Date & Time</label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="input-field col s12">
                            <textarea id="notes" name="notes" class="materialize-textarea"></textarea>
                            <label for="notes">Reason / Notes</label>
                        </div>
                    </div>
                </div>
                <div class="card-action right-align">
                    <a href="{% url 'appointment_list' %}" class="btn-flat">Cancel</a>
                    <button type="submit" class="btn blue-grey darken-3">Schedule</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
