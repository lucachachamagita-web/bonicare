{% extends 'home/base.html' %}

{% block heading %}Log Service{% endblock %}

{% block content %}
<div class="container" style="margin-top: 30px;">
    <div class="row">
        <form class="col s12 m8 offset-m2" method="POST">
            {% csrf_token %}
            <div class="card">
                <div class="card-content">
                    <span class="card-title">Log Service for {{ visit.patient.first_name }} {{ visit.patient.last_name }}</span>
                    <div class="row">
                        <div class="col s12 m8" style="margin-top: 15px;">
                            <label>Service</label>
                            <select name="service_id" required class="browser-default">
                                <option value="" disabled selected>Select Service</option>
                                {% for svc in services %}
                                <option value="{{ svc.id }}">{{ svc.name }} (Ksh {{ svc.base_price }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="input-field col s12 m4">
                            <input id="quantity" name="quantity" type="number" min="1" value="1" required>
                            <label for="quantity" class="active">Quantity</label>
                        </div>
                    </div>
                </div>
                <div class="card-action right-align">
                    <a href="{% url 'visit_list' %}" class="btn-flat">Cancel</a>
                    <button type="submit" class="btn blue-grey darken-3">Add Service</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
