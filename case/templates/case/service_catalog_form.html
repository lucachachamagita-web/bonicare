{% extends 'home/base.html' %}

{% block heading %}Add New Service{% endblock %}

{% block content %}
<div class="container" style="margin-top: 30px;">
    <div class="row">
        <form class="col s12 m8 offset-m2" method="POST">
            {% csrf_token %}
            <div class="card">
                <div class="card-content">
                    <span class="card-title">Define New Service</span>
                    <div class="row">
                        <div class="input-field col s12 m8">
                            <input id="name" name="name" type="text" required>
                            <label for="name">Service Name (e.g. Malaria Test)</label>
                        </div>
                        <div class="input-field col s12 m4">
                            <input id="base_price" name="base_price" type="number" step="0.01" min="0" required>
                            <label for="base_price">Price (KES)</label>
                        </div>
                    </div>
                </div>
                <div class="card-action right-align">
                    <a href="{% url 'service_catalog_list' %}" class="btn-flat">Cancel</a>
                    <button type="submit" class="btn blue-grey darken-3">Save Service</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
