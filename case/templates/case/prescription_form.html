{% extends 'home/base.html' %}

{% block title %}Add Prescription{% endblock %}

{% block content %}
<div class="row">
    <div class="col s12 m8 offset-m2">
        <div class="card">
            <div class="card-content">
                <span class="card-title">Prescribe Medicine for {{ visit.patient.get_full_name }}</span>
                {% if error %}
                    <div class="card-panel red lighten-4 red-text text-darken-4">{{ error }}</div>
                {% endif %}
                <form method="POST">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col s12 m8" style="margin-top: 15px;">
                            <label>Medicine (In Stock Only)</label>
                            <select name="item_id" required class="browser-default" style="display: block; width: 100%; border: 1px solid #f2f2f2; border-bottom: 1px solid #9e9e9e; outline: none; height: 3rem; background-color: transparent;">
                                <option value="" disabled selected>Select Medicine</option>
                                {% for item in items %}
                                    <option value="{{ item.id }}">{{ item.name }} (In stock: {{ item.current_quantity }}) - {{ item.unit_price }} KES</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="input-field col s12 m4">
                            <input id="quantity" name="quantity" type="number" min="1" value="1" required>
                            <label for="quantity">Quantity</label>
                        </div>
                    </div>
                </div>
                <div class="card-action right-align">
                    <a href="{% url 'visit_list' %}" class="btn-flat">Cancel</a>
                    <button type="submit" class="btn">Prescribe</button>
                </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
