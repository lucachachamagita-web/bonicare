{% extends 'home/base.html' %}

{% block heading %}Log Expense{% endblock %}

{% block content %}
<div class="container" style="margin-top: 30px;">
    <div class="row">
        <form class="col s12 m8 offset-m2" method="POST">
            {% csrf_token %}
            <div class="card">
                <div class="card-content">
                    <span class="card-title">Log Clinic Expense</span>
                    
                    <div class="row">
                        <div class="col s12 m6" style="margin-top: 15px;">
                            <label>Category</label>
                            <select name="category" required class="browser-default">
                                <option value="" disabled selected>Select Category</option>
                                <option value="Electricity">Electricity</option>
                                <option value="Water">Water</option>
                                <option value="Rent">Rent</option>
                                <option value="Waste">Waste / Biohazard</option>
                                <option value="Licensing">Licensing</option>
                                <option value="Maintenance">Maintenance / Repairs</option>
                                <option value="Supplies">General Supplies</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                        <div class="input-field col s12 m6">
                            <input id="date" name="date" type="date" required>
                            <label for="date" class="active">Date of Expense</label>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="input-field col s12">
                            <input id="amount" name="amount" type="number" step="0.01" min="0" required>
                            <label for="amount">Amount (Ksh)</label>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="input-field col s12">
                            <textarea id="description" name="description" class="materialize-textarea" required></textarea>
                            <label for="description">Description / Notes</label>
                        </div>
                    </div>
                </div>
                <div class="card-action right-align">
                    <button type="submit" class="btn blue-grey darken-3">Submit Expense</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
